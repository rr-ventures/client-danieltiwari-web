        - generic [ref=e33]: 01 — How I got here
        - heading "It took me almost a decade." [level=2] [ref=e35]
      - generic [ref=e36]:
        - generic [ref=e37]:
          - paragraph [ref=e38]: I know through personal experience how exhausting and frustrating it is to be dissatisfied yet feel stuck in life — often for reasons you aren't even fully aware of.
          - paragraph [ref=e39]:
            - text: Until I trained as a coach myself, I had never worked with one. It took me almost a decade to gain the insights I needed to slowly, steadily, climb out of the deep rut I was in. The insights ranged from finding appealing answers to fundamental questions like
            - emphasis [ref=e40]: what is the purpose of life?
            - text: ", all the way up to figuring out what I actually wanted and how to get there in today's complex world. Uncovering the limiting beliefs and inner conflicts that were holding me back — and quietly causing a lot of suffering — was a big part of it."
          - paragraph [ref=e41]: As nihilistic, disheartened, and lost as I had once been, I can assure you that that does not have to be the final destination.
          - paragraph [ref=e42]: "My own journey turned into my vocation: coaching and mentoring dissatisfied yet ambitious individuals who are struggling, for whatever reasons, to make use of their potential or to live a truly satisfying life. I am so fascinated by the unique potential each of us brings into the world that it genuinely breaks my heart to imagine someone spending years, decades, or even a lifetime settling for less than the life they would truly find worth living — simply because they didn't have access to someone who believed in them and could help them tap into it."
        - complementary [ref=e43]:
          - paragraph [ref=e44]: "\"When a bubbling spring flows out from the mountains, it's doing its thing. And if a thirsty traveller helps himself, well that's fine. And so I talk in the same spirit.\""
          - generic [ref=e45]: Alan Watts
    - generic [ref=e47]:
      - paragraph [ref=e49]: Accepting · Changing · Knowing the difference.
      - paragraph [ref=e51]: Simple, right? But as you may know, this is often far easier said than done. I spent an unnecessary number of years dissatisfied and frustrated with my life because I was too stubborn and proud to make use of tools such as coaching. I ended up having to invest so much more time, energy, and suffering than I would have, had I simply gotten someone like myself on board.
