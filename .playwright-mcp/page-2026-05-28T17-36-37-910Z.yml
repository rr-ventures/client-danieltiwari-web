        - generic [ref=e39]: 01 — The premise
        - heading "A life worth living." [level=2] [ref=e41]
      - generic [ref=e42]:
        - generic [ref=e43]:
          - paragraph [ref=e44]: We all have a vision of a life we would love to live, even if we aren't yet aware of what that life would look like. Considering the extremely limiting culture we grow up in, it's no surprise that many of us wake up to an unfulfilling life, including the unpleasant feelings that go along with that.
          - paragraph [ref=e45]: The way I have come to see things, however, is that the sole purpose of existence is the enjoyment of it, and that we're all sitting on unrecognised potential to truly do so.
          - paragraph [ref=e46]: No matter what your current circumstances may be, the goal of my work is to enable you to not only freely thrive in life but to also embrace every waking moment of it in a way that may still be unimaginable to you.
        - complementary [ref=e47]:
          - paragraph [ref=e48]: "\"Until you make the unconscious conscious, it will direct your life and you will call it fate.\""
          - generic [ref=e49]: Carl Jung
    - generic [ref=e51]:
      - figure "Performance equals potential minus limitations." [ref=e52]:
        - paragraph [ref=e53]: Performance = Potential − Limitations
      - generic [ref=e54]:
        - paragraph [ref=e55]: The degree to which we are able to thrive in life is the degree to which we are not limiting ourselves. You already have all of the inherent potential you need to achieve the life you would truly find worth living.
        - paragraph [ref=e56]: In today's world of opportunity, successful individuals aren't successful because their potential is higher than everyone else's, but because their performance is not being compromised by self-imposed limitations.
    - generic [ref=e57]:
