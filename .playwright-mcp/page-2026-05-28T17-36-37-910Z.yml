        - generic [ref=e60]: 02 — The work
        - heading "Three areas of focus." [level=2] [ref=e62]
        - paragraph [ref=e63]: Where the freedom you're looking for is actually buried.
      - generic [ref=e64]:
        - article [ref=e65]:
          - generic [ref=e66]: 01 / Attitude
          - heading "The point of departure." [level=3] [ref=e67]
          - paragraph [ref=e68]: We pave the way to consciously and effectively co-create the life and experiences we want, instead of remaining passive victims of circumstance. Characterised by responsibility, authority, commitment, freedom, humility, and self-honesty.
        - article [ref=e69]:
          - generic [ref=e70]: 02 / Metaphysics
          - heading "The foundation underneath." [level=3] [ref=e71]
          - paragraph [ref=e72]: Our beliefs give rise to the meaning our circumstances carry, which gives rise to how we feel and act. The fundamental beliefs our culture holds around existence aren't only questionable; they create fear, suffering, and severe limitation. Without debunking them, real freedom stays out of reach.
        - article [ref=e73]:
          - generic [ref=e74]: 03 / The Human Game
          - heading "Playing to win." [level=3] [ref=e75]
          - paragraph [ref=e76]: Instead of thinking about life, we live it. We reach this point when we are no longer blocked emotionally or intellectually. Once we have realised being human is the only game in town, we give up seeking and become fully available to the experiences this life has to offer. This area is about achieving the life circumstances you would actually love.
