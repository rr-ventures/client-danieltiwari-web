[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Daily nurture drip (Model B): sends each enrolled lead's next due email from
# the current repo copy. Runs at 00:00 UTC.
[functions."nurture-drip"]
  schedule = "@daily"

[[redirects]]
  from = "/api/assessment-submit"
  to = "/.netlify/functions/assessment-submit"
  status = 200

[[redirects]]
  from = "/api/newsletter-submit"
  to = "/.netlify/functions/newsletter-submit"
  status = 200

[[redirects]]
  from = "/api/result-data"
  to = "/.netlify/functions/result-data"
  status = 200

# Hosted Authenticity Map — short shareable id, rendered client-side by result.html.
[[redirects]]
  from = "/r/*"
  to = "/result.html"
  status = 200

# Old V2 pages folded into the single-page direction — send them home.
[[redirects]]
  from = "/about.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/apply.html"
  to = "/#enquire"
  status = 301
  force = true

# Assessment under construction — redirect to coming-soon page until ready to go live.
# NOTE: site links resolve extensionless (Netlify Pretty URLs), so the nav/CTA buttons
# hit /assessment, NOT /assessment.html. Both must redirect or the buttons bypass it.
[[redirects]]
  from = "/assessment"
  to = "/assessment-coming-soon.html"
  status = 302
  force = true

[[redirects]]
  from = "/assessment.html"
  to = "/assessment-coming-soon.html"
  status = 302
  force = true

[[redirects]]
  from = "/api/assessment-notify"
  to = "/.netlify/functions/assessment-notify"
  status = 200

# Working/scratch files — never publicly reachable.
[[redirects]]
  from = "/style-picker.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/homepage-direction-v1.html"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Assessment + 404 keep their own per-page noindex meta tags; the homepage is indexable.
