<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Site Notice — Daniel Tiwari</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0c0c0c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral+SC:wght@300;400;500;600&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Alegreya+SC:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site.css">
<style>
  :root{
    --bg:#0c0c0c;
    --bg2:#111111;
    --ink:#e8e4dc;
    --muted:#888480;
    --hair:#222222;
    --accent:#a0a0a0;
    --display:"Spectral SC",Georgia,serif;
    --body:"Spectral",Georgia,serif;
    --sc:"Alegreya SC",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:300;line-height:1.75;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}

  header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 2.4rem;transition:background .3s ease}
  header.scrolled{background:rgba(12,12,12,.92);border-bottom:1px solid var(--hair)}
  .header-name{font-family:var(--sc);font-size:.88rem;letter-spacing:.18em;color:var(--ink)}
  .header-back{font-family:var(--sc);font-size:.72rem;letter-spacing:.18em;color:var(--ink);border:1px solid rgba(232,228,220,.3);padding:.55rem 1.2rem;border-radius:2px;transition:border-color .2s}
  .header-back:hover{border-color:var(--ink)}

  main{max-width:34rem;margin:0 auto;padding:clamp(8rem,16vh,12rem) 2rem clamp(6rem,12vh,10rem)}
  .label{font-family:var(--sc);font-size:.72rem;letter-spacing:.35em;color:var(--accent);margin-bottom:1.6rem}
  h1{font-family:var(--display);font-weight:400;font-size:clamp(1.8rem,3vw,2.4rem);line-height:1.1;margin-bottom:2.8rem}
  .block{margin-bottom:2rem}
  .block-title{font-family:var(--sc);font-size:.72rem;letter-spacing:.25em;color:var(--accent);margin-bottom:.8rem}
  .block p{color:#b0aca4;font-size:1rem;line-height:1.85}
  .block a{color:var(--accent);transition:color .2s}
  .block a:hover{color:var(--ink)}

  footer{background:var(--bg);padding:4rem 2rem;text-align:center;border-top:1px solid var(--hair)}
  footer .foot-name{font-family:var(--sc);letter-spacing:.2em;font-size:.78rem;color:var(--accent);margin-bottom:1rem}
  footer .foot-links{font-family:var(--sc);font-size:.68rem;letter-spacing:.15em;color:var(--muted)}
  footer .foot-links a{margin:0 .8rem;transition:color .2s}
  footer .foot-links a:hover{color:var(--ink)}
  footer .hairline{height:1px;background:var(--hair);max-width:3rem;margin:0 auto 1.6rem}
</style>
</head>
<body>

<header id="bar">
  <a class="header-name" href="/">Daniel Tiwari</a>
  <a class="header-back sc" href="/">Back to site</a>
</header>

<main>
  <div class="label">Legal</div>
  <h1>Site Notice</h1>

  <div class="block">
    <div class="block-title">Angaben gemäß § 5 TMG</div>
    <p>Daniel Tiwari<br>
    c/o Postflex #3124<br>
    Emsdettener Str. 10<br>
    48268 Greven</p>
  </div>

  <div class="block">
    <div class="block-title">Kontakt</div>
    <p>E-Mail: <a href="mailto:email@danieltiwari.com">email@danieltiwari.com</a></p>
  </div>
</main>

<footer>
  <div class="hairline"></div>
  <div class="foot-name">Daniel Tiwari</div>
  <div class="foot-links">
    <a href="mailto:email@danieltiwari.com">email@danieltiwari.com</a>
    <a href="/site-notice.html">Site Notice</a>
    <a href="/privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
  </div>
</footer>

<script>
  const bar = document.getElementById('bar');
  window.addEventListener('scroll', () => bar.classList.toggle('scrolled', scrollY > 8), { passive: true });
</script>
</body>
</html>
